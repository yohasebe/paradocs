  <script>
    var BASE_PATH = '../';

    function safeLoadHTML(url, elementId) {
      fetch(url)
        .then(function(r) {
          if (!r.ok) throw new Error('HTTP ' + r.status);
          return r.text();
        })
        .then(function(html) {
          var safe = html.replace(/<script\b[^<]*(?:(?!<\/script>)<[^<]*)*<\/script>/gi, '');
          document.getElementById(elementId).innerHTML = safe;
        })
        .catch(function(err) {
          console.warn('Failed to load ' + url + ': ' + err.message);
        });
    }

    safeLoadHTML(BASE_PATH + 'data/readme_ja.html', 'readme-content');
    safeLoadHTML(BASE_PATH + 'data/documentation_ja.html', 'documentation-content');

    // Scroll-to-top button
    $(function() {
      $(window).scroll(function() {
        if ($(this).scrollTop() > 300) {
          $('#to-top').fadeIn(200);
        } else {
          $('#to-top').fadeOut(200);
        }
      });
      $('#to-top').click(function() {
        $('html, body').animate({ scrollTop: 0 }, 400);
      });
    });
  </script>
