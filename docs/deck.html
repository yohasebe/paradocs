<!doctype html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Paradocs: Paragraph-Oriented Document Presentation System</title>
    <meta name="description" content="Presentation Toolkit for Reading Class">
    <meta name="author" content="Yoichiro Hasebe">
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

    <link rel="shortcut icon" href="ico/favicon.ico">
    <link rel="apple-touch-icon" sizes="180x180" href="ico/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="32x32" href="ico/favicon-32x32.png">
    <link rel="icon" type="image/png" sizes="16x16" href="ico/favicon-16x16.png">

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.css" integrity="sha384-tK61vs+AeByBmiQ/i6CLgp/PbaaoB/k7M4J5mlX70GVtBPGUk5avjbXhSwhsf3fS" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/jquery-ui@1.14.1/dist/themes/base/jquery-ui.min.css" integrity="sha384-zR/jkclV8JzpZv6ONtyAg2c/SJQRL8k3ZYyDf2O9XGHO16FV9l6/kEdN4IGkspLj" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/theme/simple.css" integrity="sha384-ehqmozZTBdv1kA7Yt6spb58A7CjWyVBkGSylak98DAT911TnSeJFdGLTPHsHatzi" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css" integrity="sha384-nRgPTkuX86pH8yjPJUAFuASXQSSl2/bBUiNV47vSYpKFxHJhbcrGnmlYpYJMeD7a" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tippy.js@6.3.7/dist/tippy.css" integrity="sha384-IBgYl+I5X6ZDZXI5zv1vsSE3VopDomz4BxSu/GlxaPHfFtcrJ3uj70z1w6srO9zU" crossorigin="anonymous">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tippy.js@6.3.7/themes/light-border.css" integrity="sha384-oAnSdqFEFRIeYi0SBLHb5HS5ALP/C8FjjBKFAHpjn/9cXWK3iKVrWaxJRz3t9a91" crossorigin="anonymous">
  </head>
  <body>
    <div class="reveal" id="reveal-container">
      <div id="highlighted_cursor"></div>
      <div class="slides" id="slides-container">
      </div>
    </div>
    <div class='additional'>
      <div class='gadgets' id='gadgets'>
        <div class='sticky' data-prevent-swipe>
          <div class='edit_control'><i class='fa-solid fa-pencil'></i><i class='fa-solid fa-eraser'></i><i class='fa-solid fa-xmark'></i></div>
          <textarea  class='sticky_editor' spellcheck='false'></textarea>
        </div>
        <div class='note' data-prevent-swipe></div>
        <div class='imagenote' data-prevent-swipe data-enlarged='false'>
          <div class='enlarge'><span class='fa-solid fa-plus'></span></div>
        </div>
      </div>
      <div class='switches'>
        <div id='left_switches'>
          <span class='left_switch'><span class='fa-regular fa-note-sticky' id='sticky_icon'></span></span>
          <span class='left_switch'><span class='fa-solid fa-circle' id='pointer_icon'></span></span>
          <span class='left_switch'><span class='fa-solid fa-wand-magic-sparkles' id='playall_icon'></span></span>
          <span class='left_switch'><span class='fa-solid fa-volume-high' id='speaker_icon'></span></span>
        </div>
        <div id='right_switches'>
          <span class='fa-solid fa-arrows-up-down' id='overview_icon'></span>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/jquery@3.7.1/dist/jquery.min.js" integrity="sha384-1H217gwSVyLSIfaLxHbE7dRb3v4mYCKbpQvzx0cegeju1MVsGrX5xXxAvs/HgeFs" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/jquery-ui@1.14.1/dist/jquery-ui.min.js" integrity="sha384-SStJQoPipVtHHnIgUfDI+jTAbSyU+HMbhwt2XRRNpLIRFg9VguopT6Y4+cdOlkqg" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/reveal.js@5.2.1/dist/reveal.js" integrity="sha384-rZIIVPQD/+U9IL3I62KrBHuVtPgYv+xdXvER5RBiVQRszJEJfLKRrcrZwI7fhcHT" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/tippy.js@6.3.7/dist/tippy-bundle.umd.min.js" integrity="sha384-AiTRpehQ7zqeua0Ypfa6Q4ki/ddhczZxrKtiQbTQUlJIhBkTeyoZP9/W/5ulFt29" crossorigin="anonymous"></script>

    <script>
      var pconf;
      jQuery(function($){

        // Touch-punch is loaded unconditionally in paradocs.js (get_punch_script)

        // Load data from sessionStorage
        var slidesHtml = sessionStorage.getItem('paradocs_slides');
        var configJson = sessionStorage.getItem('paradocs_config');
        var cssText = sessionStorage.getItem('paradocs_css');
        var inverted = sessionStorage.getItem('paradocs_inverted');

        if (!slidesHtml || !configJson) {
          document.body.innerHTML = '<div style="text-align:center;padding:2em;"><h2>No presentation data found.</h2><p>Please go back and convert your text first.</p></div>';
          return;
        }

        // Inject slides
        document.getElementById('slides-container').innerHTML = slidesHtml;

        // Parse config
        try {
          pconf = JSON.parse(configJson);
        } catch (e) {
          document.body.innerHTML = '<div style="text-align:center;padding:2em;"><h2>Invalid configuration data.</h2><p>Please go back and convert your text again.</p></div>';
          return;
        }

        // Apply inverted class if needed
        if (inverted === 'true') {
          document.getElementById('reveal-container').classList.add('inverted');
        }

        // Inject CSS (cssText includes <style> tags from createCSS)
        if (cssText) {
          document.head.insertAdjacentHTML('beforeend', cssText);
        }
      });
    </script>

    <script src="js/tts-highlight.js"></script>
    <script src="js/paradocs.js"></script>
  </body>
</html>
